<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="face" cx="42%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#fff8f0"/>
      <stop offset="100%" stop-color="#fde0c0"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Face -->
  <circle cx="256" cy="252" r="164" fill="url(#face)"/>

  <!-- Sad eyebrows (angled inward/down) -->
  <line x1="186" y1="186" x2="226" y2="196" stroke="#4c1d95" stroke-width="10" stroke-linecap="round"/>
  <line x1="286" y1="196" x2="326" y2="186" stroke="#4c1d95" stroke-width="10" stroke-linecap="round"/>

  <!-- Closed crying eyes (downward arcs) -->
  <path d="M 186 222 Q 206 244 226 222" stroke="#3b0764" stroke-width="13" stroke-linecap="round" fill="none"/>
  <path d="M 286 222 Q 306 244 326 222" stroke="#3b0764" stroke-width="13" stroke-linecap="round" fill="none"/>

  <!-- Cheek blush -->
  <ellipse cx="190" cy="278" rx="30" ry="18" fill="#fb7185" opacity="0.38"/>
  <ellipse cx="322" cy="278" rx="30" ry="18" fill="#fb7185" opacity="0.38"/>

  <!-- Sad frown -->
  <path d="M 212 312 Q 256 294 300 312" stroke="#3b0764" stroke-width="12" stroke-linecap="round" fill="none"/>

  <!-- Left teardrop -->
  <path d="M 206 244 Q 192 268 206 284 Q 220 268 206 244 Z" fill="#38bdf8" opacity="0.88"/>

  <!-- Right teardrop -->
  <path d="M 306 244 Q 292 268 306 284 Q 320 268 306 244 Z" fill="#38bdf8" opacity="0.88"/>
</svg>
